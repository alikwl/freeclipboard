{% comment %}
Organization Schema - Enhanced for E-E-A-T and AI Entity Recognition
Includes founder linkage, knowledge graph signals, and topical authority markers
{% endcomment %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": "{{ site.url }}/#organization",
  "name": "{{ site.title }}",
  "alternateName": ["FreeClipboard", "Free Clipboard Tools", "FreeClipboard.com", "Bismillah Tech"],
  "url": "{{ site.url }}",
  "logo": {
    "@type": "ImageObject",
    "@id": "{{ site.url }}/#logo",
    "url": "{{ site.url }}/assets/images/logo.png",
    "contentUrl": "{{ site.url }}/assets/images/logo.png",
    "width": 600,
    "height": 60,
    "caption": "FreeClipboard - Free Online Tools"
  },
  "image": {
    "@type": "ImageObject",
    "url": "{{ site.url }}/assets/images/og-image.png",
    "width": 1200,
    "height": 630
  },
  "description": "{{ site.description }}",
  "foundingDate": "2024",
  "founder": {
    "@id": "{{ site.url }}/#founder"
  },
  "slogan": "Free Online Tools for Everyone",
  "knowsAbout": [
    "Web Development Tools",
    "Text Processing",
    "Image Conversion",
    "Password Generation",
    "QR Code Generation",
    "JSON Formatting",
    "Base64 Encoding",
    "Clipboard Management",
    "Client-Side JavaScript",
    "Browser-Based Applications",
    "Privacy-First Software",
    "Developer Productivity Tools",
    "Online Utility Applications",
    "Web Cryptography API",
    "Progressive Web Applications"
  ],
  "sameAs": [
    "https://twitter.com/{{ site.twitter_username | default: 'freeclipboard' }}",
    "https://github.com/{{ site.github_username | default: 'freeclipboard' }}"
  ],
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "customer support",
    "url": "{{ site.url }}/contact/",
    "availableLanguage": ["English"]
  },
  "areaServed": {
    "@type": "Place",
    "name": "Worldwide"
  },
  "serviceType": "Free Online Tools",
  "numberOfEmployees": {
    "@type": "QuantitativeValue",
    "value": 1
  },
  "ethicsPolicy": "{{ site.url }}/privacy-policy/",
  "actionableFeedbackPolicy": "{{ site.url }}/contact/",
  "publishingPrinciples": "All tools are free, open-access, and process data exclusively client-side with zero server uploads."
}
</script>
